<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quiz Viva Leve — Protocolo de Emagrecimento</title>
<style>
  :root {
    --verde: #2d5a3d; --verde2: #4a8c62; --dourado: #c9943a; --dourado2: #e8b84b;
    --creme: #fdf9f2; --branco: #ffffff; --cinza: #6b7280; --escuro: #1a1a1a;
    --erro: #dc2626; --font-title: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:var(--font-body); background:var(--creme); min-height:100vh; overflow-x:hidden; }
  .hero { background:linear-gradient(155deg,#111f17 0%,#1e3828 55%,#111f17 100%); padding:44px 20px 68px; text-align:center; }
  .hero h1 { font-family:var(--font-title); font-size:clamp(1.85rem,5.5vw,2.9rem); color:#fff; line-height:1.18; }
  .hero h1 em { color:var(--dourado2); font-style:italic; }
  .main { max-width:580px; margin:-26px auto 0; padding:0 14px 56px; position:relative; z-index:10; }
  .card { background:#fff; border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.13); overflow:hidden; }
  .prog-wrap { display:none; }
  .prog-bar { height:5px; background:#eee; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--verde),var(--dourado)); width:0%; transition:width .5s; }
  .intro { padding:34px 24px 30px; text-align: center; }
  .btn-green { width:100%; padding:18px; background:linear-gradient(135deg,var(--verde),var(--verde2)); color:#fff; border:none; border-radius:13px; font-size:1.02rem; font-weight:700; cursor:pointer; }
  .btn-green:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }
  .q-area { display:none; padding:25px 24px; }
  .q-text { font-family:var(--font-title); font-size:1.3rem; font-weight:700; color:var(--escuro); margin-bottom:20px; }
  .opt { display:flex; align-items:center; gap:12px; padding:15px; border:2px solid #e6e6e6; border-radius:12px; margin-bottom:10px; cursor:pointer; background:#fff; width:100%; text-align:left; font-size: 0.95rem; }
  .lead-area { display:none; padding:32px 24px; }
  .field-input { width:100%; padding:14px; border:2px solid #ddd; border-radius:11px; margin-bottom:5px; outline:none; font-size: 1rem; }
  .field-error { font-size:.76rem; color:var(--erro); display:none; margin-bottom:12px; }
  .field-error.show { display:block; }
  .footer { text-align:center; padding:40px 20px; font-size:0.75rem; color:#888; }
</style>
</head>
<body>

<div class="hero">
  <h1>O que está <em>bloqueando</em> seu emagrecimento?</h1>
</div>

<div class="main"><div class="card">
  <div class="prog-wrap" id="progWrap"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div></div>

  <div class="intro" id="introArea">
    <div style="font-size: 1.1rem; margin-bottom: 25px; color: #555; line-height: 1.6;">
      Descubra seu perfil metabólico e receba o protocolo ideal para o seu corpo.
    </div>
    <button class="btn-green" onclick="startQuiz()">Descobrir meu perfil agora 🍋</button>
  </div>

  <div class="q-area" id="qArea">
    <div id="qText" class="q-text"></div>
    <div id="optArea"></div>
  </div>

  <div class="lead-area" id="leadArea">
    <h2 style="margin-bottom: 15px; font-family: var(--font-title);">Análise Concluída!</h2>
    <p style="margin-bottom: 20px; color: #666;">Para onde enviamos seu perfil e o guia de acesso?</p>
    <input class="field-input" id="iNome" type="text" placeholder="Seu nome">
    <div class="field-error" id="eNome">Informe seu nome</div>
    <input class="field-input" id="iEmail" type="email" placeholder="Seu melhor e-mail">
    <div class="field-error" id="eEmail">Informe um e-mail válido</div>
    <button class="btn-green" id="btnSubmit" onclick="submitLead()">Ver meu resultado gratuito 🎁</button>
  </div>
</div></div>

<div class="footer">© Viva Leve | Material Educativo</div>

<script>
const Qs=[
  {text:"Qual o seu sentimento ao se vestir?",opts:[{t:"Tristeza por ter que 'esconder' o corpo",s:"detox"},{t:"Frustração de ver que nada mais fecha",s:"desafio"},{t:"Vergonha. Acabo desistindo de sair",s:"lowcarb"}]},
  {text:"O que mais machuca sua autoestima?",opts:[{t:"O volume constante na barriga",s:"detox"},{t:"Fugir de fotos e me esconder",s:"desafio"},{t:"A sensação de que me abandonei",s:"lowcarb"}]},
  {text:"Como se sente na intimidade?",opts:[{t:"Insegura, tentando me cobrir",s:"detox"},{t:"Fujo, não suporto que olhem meu corpo",s:"desafio"},{t:"Saudade da mulher confiante que fui",s:"lowcarb"}]},
  {text:"Qual seu pesadelo silencioso à noite?",opts:[{t:"A culpa por ter comido o que não devia",s:"detox"},{t:"O medo de nunca mais voltar ao peso",s:"desafio"},{t:"O cansaço de lutar contra a balança",s:"lowcarb"}]},
  {text:"O que as falhas te roubaram?",opts:[{t:"Esperança. Nada funciona",s:"detox"},{t:"Alegria. Sofri e o peso voltou",s:"desafio"},{t:"Meu psicológico. Sou escrava da comida",s:"lowcarb"}]},
  {text:"Seu desejo mais urgente hoje?",opts:[{t:"Acordar leve e ver a barriga reta",s:"detox"},{t:"Vestir meu jeans favorito sem sofrer",s:"desafio"},{t:"Ter orgulho de mim mesma",s:"lowcarb"}]},
  {text:"Qual frase te traria alívio?",opts:[{t:"'Nossa, você desinchou muito!'",s:"detox"},{t:"'Você rejuvenesceu 10 anos!'",s:"desafio"},{t:"'Como você está magra e confiante!'",s:"lowcarb"}]}
];

let cur=0, scores={detox:0,desafio:0,lowcarb:0};

function startQuiz(){
  document.getElementById('introArea').style.display='none';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('qArea').style.display='block';
  renderQ();
}

function renderQ(){
  const q=Qs[cur];
  document.getElementById('qText').textContent=q.text;
  const oa=document.getElementById('optArea');
  oa.innerHTML='';
  q.opts.forEach(o=>{
    const b=document.createElement('button'); b.className='opt';
    b.innerHTML=o.t; b.onclick=()=> {
      scores[o.s]++;
      if(cur<Qs.length-1){ cur++; renderQ(); }
      else { showLead(); }
    };
    oa.appendChild(b);
  });
  document.getElementById('progFill').style.width=((cur/Qs.length)*100)+'%';
}

function showLead(){
  document.getElementById('qArea').style.display='none';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('leadArea').style.display='block';
}

function submitLead(){
  const nome=document.getElementById('iNome').value.trim();
  const email=document.getElementById('iEmail').value.trim();
  const er=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  
  if(!nome || !er.test(email)) {
    document.getElementById('eNome').classList.toggle('show', !nome);
    document.getElementById('eEmail').classList.toggle('show', !er.test(email));
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; 
  btn.innerHTML = 'Liberando seu perfil... ⏳';

  const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const destino = winner === 'detox' ? '1-detox-prestige-1.html' : winner === 'desafio' ? '2-desafio-21-dias-1.html' : '3-low-carb-prestige-1.html';

  // --- O DISPARO QUE NÃO FALHA (CORS BYPASS) ---
  const url = 'https://script.google.com/macros/s/AKfycbxu_QRXF5U1nBNapxsfivxJMTbutawrtj1Gd8iiSET-hbNBKS_YhZyAQ0dchoT-tZ0I/exec';
  
  fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ "nome": nome, "email": email, "perfil": winner })
  });

  // Aguarda 800ms para garantir que o pacote saiu e força a página de vendas
  setTimeout(() => {
    window.location.href = destino;
  }, 800);
}
</script>
</body>
</html>
