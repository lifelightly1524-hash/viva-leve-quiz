<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e22">
<title>Quiz Gratuito | Viva Leve — O que está bloqueando seu emagrecimento?</title>
<style>
  :root {
    --verde: #2d5a3d; --verde2: #4a8c62; --dourado: #c9943a; --dourado2: #e8b84b;
    --creme: #fdf9f2; --branco: #ffffff; --cinza: #6b7280; --escuro: #1a1a1a;
    --erro: #dc2626; --font-title: Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:var(--font-body); background:var(--creme); min-height:100vh; overflow-x:hidden; }

  .hero { background:linear-gradient(155deg,#111f17 0%,#1e3828 55%,#111f17 100%); padding:44px 20px 68px; text-align:center; position:relative; }
  .hero h1 { font-family:var(--font-title); font-size:clamp(1.85rem,5.5vw,2.9rem); color:#fff; line-height:1.18; margin-bottom:14px; }
  .hero h1 em { color:var(--dourado2); font-style:italic; }

  .main { max-width:580px; margin:-26px auto 0; padding:0 14px 56px; position:relative; z-index:10; }
  .card { background:#fff; border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.13); overflow:hidden; }

  .prog-wrap { display:none; }
  .prog-bar { height:5px; background:#eee; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--verde),var(--dourado)); width:0%; transition:width .5s; }

  .intro { padding:34px 24px 30px; }
  .btn-green { width:100%; padding:18px; background:linear-gradient(135deg,var(--verde),var(--verde2)); color:#fff; border:none; border-radius:13px; font-size:1.02rem; font-weight:700; cursor:pointer; transition: 0.3s; }
  .btn-green:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }

  .q-area { display:none; padding:25px 24px; }
  .q-text { font-family:var(--font-title); font-size:1.3rem; font-weight:700; color:var(--escuro); margin-bottom:20px; }
  .opt { display:flex; align-items:center; gap:12px; padding:15px; border:2px solid #e6e6e6; border-radius:12px; margin-bottom:10px; cursor:pointer; background:#fff; width:100%; text-align:left; font-size: 0.95rem; }
  .opt.sel { border-color:var(--verde); background:#f0f8f3; font-weight:bold; }

  .lead-area { display:none; padding:32px 24px; }
  .field-input { width:100%; padding:14px; border:2px solid #ddd; border-radius:11px; margin-bottom:5px; outline:none; font-size: 1rem; }
  .field-input.err { border-color:var(--erro); }
  .field-error { font-size:.76rem; color:var(--erro); display:none; margin-bottom:12px; }
  .field-error.show { display:block; }
  .footer { text-align:center; padding:20px; font-size:0.75rem; color:#888; }
</style>
</head>
<body>

<div class="hero">
  <h1>O que está <em>bloqueando</em> seu emagrecimento?</h1>
</div>

<div class="main"><div class="card">
  <div class="prog-wrap" id="progWrap"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div></div>

  <div class="intro" id="introArea">
    <div style="font-size: 1.1rem; margin-bottom: 20px; color: #555; line-height: 1.6;">
      Descubra seu perfil de emagrecimento e receba um protocolo personalizado para o seu corpo.
    </div>
    <button class="btn-green" onclick="startQuiz()">Descobrir meu perfil agora 🍋</button>
  </div>

  <div class="q-area" id="qArea">
    <div id="qText" class="q-text"></div>
    <div id="optArea"></div>
  </div>

  <div class="lead-area" id="leadArea">
    <h2 style="margin-bottom: 15px; font-family: var(--font-title);">Diagnóstico Pronto!</h2>
    <p style="margin-bottom: 20px; color: #666;">Para onde enviamos seu perfil e a receita bônus?</p>
    
    <input class="field-input" id="iNome" type="text" placeholder="Seu nome">
    <div class="field-error" id="eNome">Informe seu nome</div>
    
    <input class="field-input" id="iEmail" type="email" placeholder="Seu melhor e-mail">
    <div class="field-error" id="eEmail">Informe um e-mail válido</div>
    
    <button class="btn-green" id="btnSubmit" onclick="submitLead()">Ver meu resultado gratuito 🎁</button>
  </div>
</div></div>

<div class="footer">© Viva Leve | @viva_leve_dry</div>

<script>
const Qs=[
  {text:"Quando se olha no espelho hoje, o que mais te incomoda?",opts:[{t:"Barriga inchada e retenção",s:"detox"},{t:"Efeito sanfona (engorda/emagrece)",s:"desafio"},{t:"Dúvida sobre o que comer",s:"lowcarb"}]},
  {text:"Qual sua relação com doces e massas?",opts:[{t:"Consigo controlar bem",s:"detox"},{t:"Ataco por ansiedade à noite",s:"desafio"},{t:"Sinto que sou viciada neles",s:"lowcarb"}]},
  {text:"Como está sua energia no dia a dia?",opts:[{t:"Acordo já cansada",s:"detox"},{t:"Tenho picos de energia e quedas",s:"desafio"},{t:"Normal, mas o peso não desce",s:"lowcarb"}]},
  {text:"Já tentou dietas antes?",opts:[{t:"Várias, mas desisti por fome",s:"desafio"},{t:"Sim, mas me sinto sempre inchada",s:"detox"},{t:"Nunca fiz nada sério antes",s:"lowcarb"}]},
  {text:"O que seria um emagrecimento ideal para você?",opts:[{t:"Algo natural que limpe meu corpo",s:"detox"},{t:"Um passo a passo de 21 dias",s:"desafio"},{t:"Aprender a comer sem passar fome",s:"lowcarb"}]},
  {text:"Em quanto tempo quer ver os primeiros resultados?",opts:[{t:"Em menos de 7 dias",s:"detox"},{t:"Em 3 semanas (21 dias)",s:"desafio"},{t:"No meu tempo, sem pressa",s:"lowcarb"}]},
  {text:"Qual seu maior objetivo hoje?",opts:[{t:"Desinchar e ganhar saúde",s:"detox"},{t:"Perder 5kg a 10kg rápido",s:"desafio"},{t:"Mudar de vida definitivamente",s:"lowcarb"}]}
];

let cur=0, scores={detox:0,desafio:0,lowcarb:0}, selScore=null;

function startQuiz(){
  document.getElementById('introArea').style.display='none';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('qArea').style.display='block';
  renderQ();
}

function renderQ(){
  const q=Qs[cur];
  document.getElementById('qText').textContent=q.text;
  const oa=document.getElementById('optArea');
  oa.innerHTML='';
  q.opts.forEach(o=>{
    const b=document.createElement('button'); b.className='opt';
    b.innerHTML=o.t; b.onclick=()=> {
      scores[o.s]++;
      if(cur<Qs.length-1){ cur++; renderQ(); }
      else { showLead(); }
    };
    oa.appendChild(b);
  });
  document.getElementById('progFill').style.width=((cur/Qs.length)*100)+'%';
}

function showLead(){
  document.getElementById('qArea').style.display='none';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('leadArea').style.display='block';
}

function submitLead(){
  const nome=document.getElementById('iNome').value.trim();
  const email=document.getElementById('iEmail').value.trim();
  const er=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  
  // Validação básica
  let valid = true;
  if(!nome) { document.getElementById('eNome').classList.add('show'); valid=false; } else { document.getElementById('eNome').classList.remove('show'); }
  if(!er.test(email)) { document.getElementById('eEmail').classList.add('show'); valid=false; } else { document.getElementById('eEmail').classList.remove('show'); }
  if(!valid) return;

  // --- 🚀 TRAVA DO BOTÃO ---
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; 
  btn.innerHTML = 'Gerando seu diagnóstico... ⏳';

  const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

  // --- 🔗 CONEXÃO COM VERSÃO 18 (URL ATUALIZADA) ---
  fetch('https://script.google.com/macros/s/AKfycbwx8X8LmAhSQ17EQRzlF_7KpeE0viFLPaG7BxeUioc3XW-e1wXy0zJYmmFqjqY0EdUx/exec', {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ "nome": nome, "email": email, "perfil": winner })
  }).then(() => {
    setTimeout(() => { 
      window.location.href = winner === 'detox' ? '1-detox-prestige-1.html' : winner === 'desafio' ? '2-desafio-21-dias-1.html' : '3-low-carb-prestige-1.html';
    }, 1500);
  }).catch(() => {
    window.location.href = 'index.html'; // Fallback em caso de erro
  });
}
</script>
</body>
</html>
